name: FontScan Elite — Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Убрали строку cache: 'npm', которая роняла сборку без lock-файла

      # НАШ НЕСТАНДАРТНЫЙ ХАК: Ручной кэш папки .npm на основе package.json
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-cache-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: |
          # Настраиваем устойчивость npm к сетевым сбоям и обрывам соединения
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retries 5
          
          # Запускаем установку зависимостей
          npm install --legacy-peer-deps

      - name: Build web assets for Capacitor
        env:
          CAPACITOR_BUILD: '1'
          CI: 'true' 
        run: |
          # НАШ НЕСТАНДАРТНЫЙ ХАК: Полное многострочное исправление скрипта через Node.js прямо перед сборкой!
          if [ -f "scripts/build-capacitor-html.mjs" ]; then
            echo "Исправляем синтаксическую ошибку многострочного разрыва в build-capacitor-html.mjs..."
            node -e "
              const fs = require('fs');
              const path = 'scripts/build-capacitor-html.mjs';
              let code = fs.readFileSync(path, 'utf8');
              const originalLength = code.length;
              // Находим многострочный .split(\" ... \") с любыми переносами и меняем на безопасный regex
              code = code.replace(/\.split\(\s*\"[\s\S]*?\"\s*\)/g, '.split(/\\\\r?\\\\n/)');
              if (code.length !== originalLength) {
                fs.writeFileSync(path, code, 'utf8');
                console.log('👉 [SUCCESS] Сломанный многострочный .split() успешно вылечен!');
              } else {
                console.log('👉 [WARN] Многострочный .split() не найден или уже заменен.');
              }
            " || echo "Пропускаем исправление скрипта"
          fi

          npm run build
          
          # НАШ НЕСТАНДАРТНЫЙ ХАК: Переносим сгенерированные файлы туда, где их ждет Capacitor!
          if [ -d "dist/client" ]; then
            echo "Копируем отрендеренные ресурсы из dist/client в корень dist..."
            cp -r dist/client/* dist/
          fi
          
          # Проверяем, что главный файл на месте
          if [ -f "dist/index.html" ]; then
            echo "SUCCESS: index.html успешно подготовлен для Capacitor!"
          else
            echo "FATAL: index.html отсутствует в dist!" && exit 1
          fi

      - name: Add Android platform (conditional)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already present — skipping cap add"
          fi

      - name: Clean stale Capacitor web assets
        run: rm -rf android/app/src/main/assets/public/*

      - name: Capacitor sync
        run: npx cap sync android

      - name: Apply native Android patches after sync
        run: node scripts/apply-android-patches.cjs

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FontScan-Elite-Official-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
