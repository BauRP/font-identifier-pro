buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // 1. Ставим версию, которую требуют логи
        classpath 'com.android.tools.build:gradle:8.9.1' 
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

apply plugin: 'com.android.application'

android {
    namespace "com.trivo.app" // Убедитесь, что это совпадает с Firebase!
    compileSdk 36

    defaultConfig {
        applicationId "com.trivo.app"
        minSdkVersion 22
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    // 2. Вместо той ошибки пишем это здесь
    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }
}

repositories {
    google()
    mavenCentral()
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    
    // 3. ФИКС: Явно указываем версию 1.15.0, чтобы билд не лез к 1.17.0
    implementation "androidx.core:core:1.15.0"
    implementation "androidx.core:core-ktx:1.15.0"
    
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
}

apply from: 'capacitor.build.gradle'

try {
    if (file('google-services.json').exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found")
}
