name: FontScan Elite — Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          # Убрали строку cache: 'npm', которая роняла сборку без lock-файла

      # НАШ НЕСТАНДАРТНЫЙ ХАК: Ручной кэш папки .npm на основе package.json
      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-cache-${{ hashFiles('**/package.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-cache-

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: |
          # Настраиваем устойчивость npm к сетевым сбоям и обрывам соединения
          npm config set fetch-retry-maxtimeout 120000
          npm config set fetch-retry-mintimeout 20000
          npm config set fetch-retries 5
          
          # Запускаем установку зависимостей
          npm install --legacy-peer-deps

      - name: Build web assets for Capacitor
        env:
          CAPACITOR_BUILD: '1'
          CI: 'true' 
          # Безопасная передача кода через переменную окружения GitHub
          FIX_SYNTAX_JS: |
            const fs = require('fs');
            const path = 'scripts/build-capacitor-html.mjs';
            if (fs.existsSync(path)) {
                let code = fs.readFileSync(path, 'utf8');
                
                // 1. Если там просто пустой физический перенос -> меняем на правильный \n
                code = code.replace(/\.split\(\s*["']\s*\r?\n\s*["']\s*\)/g, ".split('\\n')");
                
                // 2. Если внутри есть текст с переносом -> меняем кавычки на обратные (backticks)
                code = code.replace(/\.split\(\s*"([^"]*\r?\n[^"]*)"\s*\)/g, ".split(`$1`)");
                code = code.replace(/\.split\(\s*'([^']*\r?\n[^']*)'\s*\)/g, ".split(`$1`)");
                
                fs.writeFileSync(path, code, 'utf8');
            }
        run: |
          # Функция для абсолютного лечения ошибки (Без использования heredoc/EOF)
          fix_script() {
            if [ -f "scripts/build-capacitor-html.mjs" ]; then
              echo "Создаем и запускаем скрипт-хирург fix-syntax.js из окружения..."
              printf '%s' "$FIX_SYNTAX_JS" > scripts/fix-syntax.js
              node scripts/fix-syntax.js
              echo "👉 [SUCCESS] Синтаксис вылечен хирургически точно!"
            fi
          }

          # Фаза 1: Первичное лечение файла на диске перед запуском сборки
          fix_script

          # Фаза 2: Запускаем только Vite-сборку и пререндер страниц
          echo "Запускаем сборку сред и пререндер через Vite..."
          npx vite build

          # Фаза 3: Вторичное лечение файла — перезаписываем его, если Vite затер изменения из кэша
          echo "Проверяем файлы после сборки Vite..."
          fix_script

          # Фаза 4: Вручную запускаем финальный скрипт постобработки
          echo "Запускаем финальный скрипт постобработки..."
          node scripts/post-build.mjs
          
          # НАШ НЕСТАНДАРТНЫX ХАК: Переносим сгенерированные файлы туда, где их ждет Capacitor!
          if [ -d "dist/client" ]; then
            echo "Копируем отрендеренные ресурсы из dist/client в корень dist..."
            cp -r dist/client/* dist/
          fi
          
          # Проверяем, что главный файл на месте
          if [ -f "dist/index.html" ]; then
            echo "SUCCESS: index.html успешно подготовлен для Capacitor!"
          else
            echo "FATAL: index.html отсутствует в dist!" && exit 1
          fi

      - name: Add Android platform (conditional)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already present — skipping cap add"
          fi

      - name: Clean stale Capacitor web assets
        run: rm -rf android/app/src/main/assets/public/*

      - name: Capacitor sync
        run: npx cap sync android

      - name: Apply native Android patches after sync
        run: node scripts/apply-android-patches.cjs

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FontScan-Elite-Official-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
