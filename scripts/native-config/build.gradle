buildscript {
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        // Версия 8.9.1 необходима для корректной поддержки compileSdk 36
        classpath 'com.android.tools.build:gradle:8.9.1' 
        classpath 'com.google.gms:google-services:4.4.2'
    }
}

apply plugin: 'com.android.application'

android {
    namespace "com.trivo.app"
    compileSdk 36

    defaultConfig {
        applicationId "com.trivo.app"
        
        // Установлено 24, чтобы удовлетворить требования библиотеки ioncamera
        minSdkVersion 24 
        
        targetSdkVersion 36
        versionCode 1
        versionName "1.0"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
    }

    lintOptions {
        checkReleaseBuilds false
        abortOnError false
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_21
        targetCompatibility JavaVersion.VERSION_21
    }

    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    google()
    mavenCentral()
}

// Принудительная фиксация версий для предотвращения конфликтов с API 36
configurations.all {
    resolutionStrategy.force "androidx.core:core:1.15.0"
    resolutionStrategy.force "androidx.core:core-ktx:1.15.0"
}

dependencies {
    // Безопасный поиск локальных библиотек без использования flatDir
    implementation fileTree(dir: 'libs', include: ['*.jar', '*.aar'])
    
    implementation "androidx.core:core:1.15.0"
    implementation "androidx.core:core-ktx:1.15.0"
    
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')

    implementation platform('com.google.firebase:firebase-bom:33.5.1')
    implementation 'com.google.firebase:firebase-messaging'
    implementation 'com.google.firebase:firebase-analytics'
}

apply from: 'capacitor.build.gradle'

try {
    if (file('google-services.json').exists()) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found")
}
