name: FontScan Elite — Android Build

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21 (Zulu)
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          # Обновлено до API 36 для соответствия вашим целям разработки
          packages: 'platforms;android-36 build-tools;36.0.0'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build web assets for Capacitor
        env:
          CAPACITOR_BUILD: '1'
        run: |
          npm run build
          test -f dist/index.html || (echo "FATAL: dist/index.html missing" && exit 1)

      - name: Add Android platform (conditional)
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          else
            echo "Android platform already present — skipping cap add"
          fi

      - name: Clean stale Capacitor web assets
        run: rm -rf android/app/src/main/assets/public/*

      - name: Capacitor sync
        run: npx cap sync android

      - name: Apply native Android patches after sync
        run: node scripts/apply-android-patches.cjs

      - name: Gradle assembleDebug
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: FontScan-Elite-Official-Build
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 14
